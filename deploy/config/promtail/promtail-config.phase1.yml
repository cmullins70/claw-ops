server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: varlogs
    static_configs:
      - targets: [localhost]
        labels:
          job: varlogs
          __path__: /var/log/*log

  - job_name: docker-openclaw-only
    static_configs:
      - targets: [localhost]
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*log
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - source_labels: [__path__]
        target_label: source_path
      - source_labels: [__path__]
        regex: .*/([a-f0-9]{64})/.*
        target_label: container_id
