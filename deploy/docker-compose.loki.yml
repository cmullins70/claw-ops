# Optional Loki + Promtail overlay for log ingestion.
#
# Usage:
#   docker compose -f docker-compose.phase1.yml -f docker-compose.loki.yml up -d
#
# This adds centralized log collection. Not required for core Claw Ops
# functionality (alert intake, incident management, policy/runbook engine).
# Enable this if your OpenClaw deployment uses Loki for log aggregation
# or if you want container/host log search in Grafana.

services:
  loki:
    image: grafana/loki:3.1.1
    container_name: claw-ops-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3100"
    volumes:
      - ./config/loki/loki-config.phase1.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    mem_limit: 512m
    cpus: 0.50
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  promtail:
    image: grafana/promtail:3.1.1
    container_name: claw-ops-promtail
    restart: unless-stopped
    volumes:
      - ./config/promtail/promtail-config.phase1.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.25

  # Extend Grafana to depend on Loki when the overlay is active
  grafana:
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

volumes:
  loki-data:
