services:
  grafana:
    image: grafana/grafana:11.1.0
    container_name: claw-ops-grafana
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.50
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: claw-ops-prometheus
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:9091:9090"
    volumes:
      - ./config/prometheus/prometheus.phase1.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    mem_limit: 768m
    cpus: 0.75
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: claw-ops-alertmanager
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:9094:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    depends_on:
      claw-ops-event-processor:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: claw-ops-node-exporter
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:9101:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
    mem_limit: 128m
    cpus: 0.20

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: claw-ops-cadvisor
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:8081:8080"
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    mem_limit: 384m
    cpus: 0.50

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: claw-ops-blackbox
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:9116:9115"
    volumes:
      - ./config/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    mem_limit: 96m
    cpus: 0.10

  claw-ops-event-processor:
    build:
      context: ../app
      dockerfile: Dockerfile
    image: claw-ops-event-processor:phase1
    container_name: claw-ops-event-processor
    restart: unless-stopped
    ports:
      - "${CLAW_OPS_BIND:-127.0.0.1}:8787:8787"
    environment:
      NODE_ENV: production
      CLAW_OPS_PORT: "8787"
      CLAW_OPS_DB_PATH: /data/claw-ops.sqlite
      CLAW_OPS_SHARED_SECRET: ${CLAW_OPS_SHARED_SECRET:?Set CLAW_OPS_SHARED_SECRET in .env}
      CLAW_OPS_POLICIES_DIR: /policies
      CLAW_OPS_RUNBOOKS_DIR: /runbooks
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - claw-ops-data:/data
      - ../policies:/policies:ro
      - ../runbooks:/runbooks:ro
    mem_limit: 256m
    cpus: 0.25

volumes:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  claw-ops-data:

networks:
  default:
    name: claw-ops-phase1
