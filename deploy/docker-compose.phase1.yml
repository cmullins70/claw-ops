version: "3.9"

services:
  grafana:
    image: grafana/grafana:11.1.0
    container_name: claw-ops-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: change-me
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    mem_limit: 512m
    cpus: 0.50

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: claw-ops-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./config/prometheus/prometheus.phase1.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts:/etc/prometheus/alerts:ro
      - ./data/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    mem_limit: 768m
    cpus: 0.75

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: claw-ops-alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9094:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    mem_limit: 128m
    cpus: 0.25

  loki:
    image: grafana/loki:3.1.1
    container_name: claw-ops-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3101:3100"
    volumes:
      - ./config/loki/loki-config.phase1.yml:/etc/loki/local-config.yaml:ro
      - ./data/loki:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    mem_limit: 512m
    cpus: 0.50

  promtail:
    image: grafana/promtail:3.1.1
    container_name: claw-ops-promtail
    restart: unless-stopped
    volumes:
      - ./config/promtail/promtail-config.phase1.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    mem_limit: 256m
    cpus: 0.25

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: claw-ops-node-exporter
    restart: unless-stopped
    ports:
      - "127.0.0.1:9101:9100"
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
    mem_limit: 128m
    cpus: 0.20

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: claw-ops-cadvisor
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    mem_limit: 384m
    cpus: 0.50

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: claw-ops-blackbox
    restart: unless-stopped
    ports:
      - "127.0.0.1:9116:9115"
    volumes:
      - ./config/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    mem_limit: 96m
    cpus: 0.10

  claw-ops-event-processor:
    image: node:20-alpine
    container_name: claw-ops-event-processor
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "echo 'Replace with real app startup'; tail -f /dev/null"]
    ports:
      - "127.0.0.1:8787:8787"
    environment:
      NODE_ENV: production
      CLAW_OPS_DB_PATH: /data/claw-ops.sqlite
      CLAW_OPS_SHARED_SECRET: change-me
    volumes:
      - ./app:/app
      - ./data/claw-ops:/data
      - ./policies:/app/policies:ro
      - ./runbooks:/app/runbooks:ro
    mem_limit: 256m
    cpus: 0.25

networks:
  default:
    name: claw-ops-phase1
